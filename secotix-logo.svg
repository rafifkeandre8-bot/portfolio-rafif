<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#040d1a"/>
      <stop offset="100%" stop-color="#010408"/>
    </radialGradient>

    <!-- Cyan glow gradient -->
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Main icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="40%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#c44eff"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="50%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#c44eff"/>
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00aaff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c44eff" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle glow -->
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="circleClip">
      <circle cx="250" cy="220" r="155"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="250" fill="url(#bgGrad)"/>

  <!-- Ambient glow center -->
  <circle cx="250" cy="220" r="180" fill="url(#cyanGlow)"/>

  <!-- ── OUTER RING ── -->
  <!-- Main outer ring -->
  <circle cx="250" cy="220" r="158" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.6"/>
  <!-- Dashed decorative ring -->
  <circle cx="250" cy="220" r="168" fill="none" stroke="rgba(0,245,212,0.15)" stroke-width="1" stroke-dasharray="8 6"/>
  <!-- Inner ring -->
  <circle cx="250" cy="220" r="148" fill="none" stroke="rgba(0,170,255,0.2)" stroke-width="0.8"/>

  <!-- Ring tick marks (12 ticks like a gauge) -->
  <g stroke="rgba(0,245,212,0.5)" stroke-width="2">
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(0 250 220)"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(30 250 220)" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(60 250 220)" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(90 250 220)"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(120 250 220)" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(150 250 220)" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(180 250 220)"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(210 250 220)" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(240 250 220)" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(270 250 220)"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(300 250 220)" stroke-width="1" opacity="0.4"/>
    <line x1="250" y1="54" x2="250" y2="62" transform="rotate(330 250 220)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- ── MAIN ICON: Water drop + circuit ── -->
  <!-- Glow backdrop for icon -->
  <ellipse cx="250" cy="215" rx="70" ry="80" fill="rgba(0,245,212,0.06)" filter="url(#strongGlow)"/>

  <!-- Water drop shape (main symbol) -->
  <!-- Drop body -->
  <path d="M250 110 
           C250 110 195 175 195 210 
           C195 242 220 265 250 265 
           C280 265 305 242 305 210 
           C305 175 250 110 250 110 Z"
        fill="none" stroke="url(#iconGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Drop fill (translucent) -->
  <path d="M250 120 
           C250 120 200 180 200 210 
           C200 239 223 260 250 260 
           C277 260 300 239 300 210 
           C300 180 250 120 250 120 Z"
        fill="rgba(0,245,212,0.06)"/>

  <!-- Circuit lines inside drop -->
  <!-- Horizontal line center -->
  <line x1="218" y1="210" x2="282" y2="210" stroke="rgba(0,245,212,0.5)" stroke-width="1.2" filter="url(#subtleGlow)"/>
  <!-- Vertical line center -->
  <line x1="250" y1="178" x2="250" y2="248" stroke="rgba(0,170,255,0.5)" stroke-width="1.2" filter="url(#subtleGlow)"/>
  <!-- Diagonal lines -->
  <line x1="224" y1="184" x2="276" y2="236" stroke="rgba(196,78,255,0.3)" stroke-width="0.8"/>
  <line x1="276" y1="184" x2="224" y2="236" stroke="rgba(196,78,255,0.3)" stroke-width="0.8"/>

  <!-- Circuit nodes (dots at intersections) -->
  <circle cx="250" cy="210" r="5" fill="#00f5d4" filter="url(#glow)"/>
  <circle cx="218" cy="210" r="3" fill="rgba(0,245,212,0.7)"/>
  <circle cx="282" cy="210" r="3" fill="rgba(0,245,212,0.7)"/>
  <circle cx="250" cy="178" r="3" fill="rgba(0,170,255,0.7)"/>
  <circle cx="250" cy="248" r="3" fill="rgba(0,170,255,0.7)"/>

  <!-- Small circuit pads -->
  <rect x="243" y="203" width="14" height="14" rx="2" fill="none" stroke="rgba(0,245,212,0.4)" stroke-width="1"/>

  <!-- Flow arrows (water flowing down) -->
  <path d="M250 155 L246 163 L250 161 L254 163 Z" fill="rgba(0,245,212,0.6)"/>

  <!-- Stage markers around drop (4 dots for 4 stages) -->
  <circle cx="250" cy="148" r="4" fill="rgba(0,170,255,0.8)" filter="url(#subtleGlow)"/>
  <circle cx="298" cy="185" r="4" fill="rgba(255,45,85,0.8)" filter="url(#subtleGlow)"/>
  <circle cx="284" cy="250" r="4" fill="rgba(240,98,146,0.8)" filter="url(#subtleGlow)"/>
  <circle cx="216" cy="250" r="4" fill="rgba(15,255,138,0.8)" filter="url(#subtleGlow)"/>

  <!-- Stage labels (tiny) -->
  <text x="250" y="142" text-anchor="middle" font-family="monospace" font-size="7" fill="rgba(0,170,255,0.7)">G01</text>
  <text x="312" y="189" text-anchor="start" font-family="monospace" font-size="7" fill="rgba(255,45,85,0.7)">G02</text>
  <text x="292" y="262" text-anchor="start" font-family="monospace" font-size="7" fill="rgba(240,98,146,0.7)">G03</text>
  <text x="202" y="262" text-anchor="end" font-family="monospace" font-size="7" fill="rgba(15,255,138,0.7)">G04</text>

  <!-- Connecting arcs between stage dots -->
  <path d="M250 152 Q285 162 294 181" fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M298 189 Q305 220 284 246" fill="none" stroke="rgba(255,45,85,0.15)" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M280 250 Q250 265 220 250" fill="none" stroke="rgba(15,255,138,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M216 246 Q196 220 204 183" fill="none" stroke="rgba(0,245,212,0.15)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ── BOTTOM DECORATIVE ELEMENTS ── -->
  <!-- Horizontal separator lines -->
  <line x1="80" y1="298" x2="195" y2="298" stroke="rgba(0,245,212,0.2)" stroke-width="0.8"/>
  <line x1="305" y1="298" x2="420" y2="298" stroke="rgba(0,245,212,0.2)" stroke-width="0.8"/>
  <!-- Center dot on separator -->
  <circle cx="250" cy="298" r="3" fill="rgba(0,245,212,0.5)"/>
  <circle cx="250" cy="298" r="6" fill="none" stroke="rgba(0,245,212,0.2)" stroke-width="1"/>

  <!-- ── MAIN TEXT: SECOTIX ── -->
  <text x="250" y="340"
        text-anchor="middle"
        font-family="'Orbitron', 'Arial Black', sans-serif"
        font-size="52"
        font-weight="900"
        letter-spacing="6"
        fill="url(#textGrad)"
        filter="url(#glow)">SECOTIX</text>

  <!-- Text glow layer -->
  <text x="250" y="340"
        text-anchor="middle"
        font-family="'Orbitron', 'Arial Black', sans-serif"
        font-size="52"
        font-weight="900"
        letter-spacing="6"
        fill="none"
        stroke="rgba(0,245,212,0.15)"
        stroke-width="2"
        filter="url(#strongGlow)">SECOTIX</text>

  <!-- ── SUBTITLE: SMART ── -->
  <text x="250" y="364"
        text-anchor="middle"
        font-family="monospace"
        font-size="13"
        font-weight="400"
        letter-spacing="14"
        fill="rgba(0,245,212,0.5)">SMART</text>

  <!-- ── TAGLINE ── -->
  <!-- Left line -->
  <line x1="78" y1="388" x2="170" y2="388" stroke="rgba(0,245,212,0.18)" stroke-width="0.8"/>
  <!-- Right line -->
  <line x1="330" y1="388" x2="422" y2="388" stroke="rgba(0,245,212,0.18)" stroke-width="0.8"/>

  <text x="250" y="392"
        text-anchor="middle"
        font-family="monospace"
        font-size="8"
        letter-spacing="3"
        fill="rgba(0,245,212,0.35)">SMART WATER TREATMENT SYSTEM</text>

  <!-- ── OPSI BADGE ── -->
  <rect x="186" y="408" width="128" height="20" rx="3"
        fill="rgba(0,245,212,0.05)"
        stroke="rgba(0,245,212,0.2)"
        stroke-width="0.8"/>
  <text x="250" y="422"
        text-anchor="middle"
        font-family="monospace"
        font-size="7.5"
        letter-spacing="2"
        fill="rgba(0,245,212,0.5)">OPSI 2026 · BIDANG FTR</text>

  <!-- ── CORNER DECORATIONS ── -->
  <!-- Top-left corner bracket -->
  <path d="M30 30 L30 55 M30 30 L55 30" fill="none" stroke="rgba(0,245,212,0.25)" stroke-width="1.5"/>
  <!-- Top-right corner bracket -->
  <path d="M470 30 L470 55 M470 30 L445 30" fill="none" stroke="rgba(0,245,212,0.25)" stroke-width="1.5"/>
  <!-- Bottom-left corner bracket -->
  <path d="M30 470 L30 445 M30 470 L55 470" fill="none" stroke="rgba(0,245,212,0.25)" stroke-width="1.5"/>
  <!-- Bottom-right corner bracket -->
  <path d="M470 470 L470 445 M470 470 L445 470" fill="none" stroke="rgba(0,245,212,0.25)" stroke-width="1.5"/>

  <!-- Corner dots -->
  <circle cx="30" cy="30" r="2.5" fill="rgba(0,245,212,0.4)"/>
  <circle cx="470" cy="30" r="2.5" fill="rgba(0,245,212,0.4)"/>
  <circle cx="30" cy="470" r="2.5" fill="rgba(0,245,212,0.4)"/>
  <circle cx="470" cy="470" r="2.5" fill="rgba(0,245,212,0.4)"/>

  <!-- ── REV TAG ── -->
  <text x="470" y="480"
        text-anchor="end"
        font-family="monospace"
        font-size="7"
        fill="rgba(0,245,212,0.2)"
        letter-spacing="1">Rev.9</text>
</svg>
